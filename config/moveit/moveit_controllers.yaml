# MoveIt Controller Interface Configuration
# Maps MoveIt planning groups to ros2_control controllers

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - arm_left_joint_trajectory_controller
    - arm_right_joint_trajectory_controller

  arm_left_joint_trajectory_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - kinova_left_joint_1
      - kinova_left_joint_2
      - kinova_left_joint_3
      - kinova_left_joint_4
      - kinova_left_joint_5
      - kinova_left_joint_6
      - kinova_left_joint_7

  arm_right_joint_trajectory_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - kinova_right_joint_1
      - kinova_right_joint_2
      - kinova_right_joint_3
      - kinova_right_joint_4
      - kinova_right_joint_5
      - kinova_right_joint_6
      - kinova_right_joint_7
